plugins {
	id 'java-library'
	id 'maven-publish'

	id "com.diffplug.spotless" version "6.7.2"
	id "io.freefair.lombok" version "6.5.0.2"
}

group 'org.tframework'
version '0.0.1'

repositories {
	mavenCentral()
}

dependencies {
	//logging
	implementation 'org.apache.logging.log4j:log4j-api:2.17.2'
	implementation 'org.apache.logging.log4j:log4j-core:2.17.2'
	implementation 'org.apache.logging.log4j:log4j-slf4j-impl:2.17.2'

	// internal dependencies
	implementation 'org.apache.commons:commons-lang3:3.12.0'
	implementation 'org.reflections:reflections:0.10.2'
	implementation 'org.jgrapht:jgrapht-core:1.5.1'
	//Junit5 api is required even in main codebase, see 'org.tframework.core.test' package
	implementation 'org.junit.jupiter:junit-jupiter-api:5.8.2'

	// testing
	testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.2'
	testImplementation 'org.junit.jupiter:junit-jupiter-params:5.8.2'
	testRuntimeOnly 'org.junit.jupiter:junit-jupiter-params:5.8.2'
}

test {
	useJUnitPlatform()
}

//spotless check configuration
spotless {

	format 'misc', {
		// define the files to apply `misc` to
		target '*.gradle', '*.md', '.gitignore'

		// define the steps to apply to those files
		trimTrailingWhitespace()
		indentWithTabs()
		endWithNewline()
	}

	java {
		importOrder()
		removeUnusedImports()

		//add Apache license to all java files
		licenseHeader '/* Licensed under Apache-2.0 $YEAR. */'
	}
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
		}
	}
	repositories {
		mavenLocal()
	}
}
