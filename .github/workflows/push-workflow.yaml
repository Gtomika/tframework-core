name: push-workflow
on: [push]
jobs:
  on-push-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
      - uses: gradle/gradle-build-action@v2
      - run: ./gradlew clean build # make sure it can build
      - run: ./gradlew :spotlessJavaCheck # make sure spotless check is passed
      - run: ./gradlew test # make sure unit test pass
